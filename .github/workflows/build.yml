name: Build HarmonyOS

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release

# 同一 PR/分支只保留最新的构建
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: '--max_old_space_size=8192'
  # ========== 版本配置（更新 SDK/工具时修改这里） ==========
  SDK_VERSION: '6.0-Release'
  CMDLINE_TOOLS_VERSION: '5.1.0.840'
  CACHE_VERSION: 'v3'

jobs:
  build:
    name: Build (${{ github.event.inputs.build_type || 'debug' }})
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    # ────────────────────────────────────────────
    # 基础环境
    # ────────────────────────────────────────────
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Get version info
      id: version
      run: |
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          VERSION="${GITHUB_REF#refs/tags/v}"
        else
          VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo "dev-${GITHUB_SHA:0:7}")"
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "📦 Version: $VERSION"

    - name: Determine build mode
      id: build-mode
      run: |
        if [[ "${{ github.event.inputs.build_type }}" == "release" ]] || [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          echo "mode=release" >> "$GITHUB_OUTPUT"
        else
          echo "mode=debug" >> "$GITHUB_OUTPUT"
        fi

    # 检查是否配置了签名 Secrets（决定是否能构建 .app）
    - name: Check signing config
      id: signing
      run: |
        if [[ -n "${{ secrets.SIGNING_CERT }}" ]] && [[ -n "${{ secrets.SIGNING_PROFILE }}" ]] && [[ -n "${{ secrets.SIGNING_KEYSTORE }}" ]]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "✅ Signing secrets configured — will build .app"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
          echo "ℹ️  No signing secrets — will build unsigned .hap only"
        fi

    # ────────────────────────────────────────────
    # 磁盘空间
    # ────────────────────────────────────────────
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                     "$AGENT_TOOLSDIRECTORY" /opt/hostedtoolcache/CodeQL
        df -h /

    # ────────────────────────────────────────────
    # SDK & 工具缓存 + 下载
    # ────────────────────────────────────────────
    - name: Cache OHOS SDK & tools
      id: cache-sdk
      uses: actions/cache@v4
      with:
        path: |
          ~/ohos-sdk
          ~/cmdline-tools
        key: ohos-${{ env.SDK_VERSION }}-tools-${{ env.CMDLINE_TOOLS_VERSION }}-${{ env.CACHE_VERSION }}

    - name: Download OHOS SDK
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      run: |
        set -euo pipefail
        SDK_URL="https://repo.huaweicloud.com/harmonyos/os/${{ env.SDK_VERSION }}/ohos-sdk-windows_linux-public.tar.gz"
        echo "⬇️  Downloading SDK: $SDK_URL"

        mkdir -p ~/ohos-sdk && cd ~/ohos-sdk
        curl -L --retry 3 --retry-delay 10 -o sdk.tar.gz "$SDK_URL" --progress-bar --fail
        tar -xzf sdk.tar.gz && rm sdk.tar.gz

        if [ -d "linux" ]; then
          echo "ZIP files in linux/:"
          ls -la linux/*.zip 2>/dev/null
          for zip in linux/*.zip; do
            [ -f "$zip" ] && unzip -q -o "$zip" -d . && echo "  ✓ $(basename "$zip")"
          done
          rm -rf linux windows
        fi
        echo "Extracted SDK components:"
        ls -la ~/ohos-sdk/
        echo "✅ SDK ready" && df -h /

    - name: Download command-line-tools
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      run: |
        set -euo pipefail
        TOOLS_VER="${{ env.CMDLINE_TOOLS_VERSION }}"
        TOOLS_PREFIX="${TOOLS_VER%.*}"
        TOOLS_URL="https://repo.huaweicloud.com/harmonyos/ohpm/${TOOLS_PREFIX}/commandline-tools-linux-x64-${TOOLS_VER}.zip"
        echo "⬇️  Downloading tools: $TOOLS_URL"

        cd ~
        curl -L --retry 3 --retry-delay 10 -o cmdline-tools.zip "$TOOLS_URL" --progress-bar --fail
        unzip -q cmdline-tools.zip
        [ -d "command-line-tools" ] && mv command-line-tools ~/cmdline-tools
        rm -f cmdline-tools.zip
        chmod -R +x ~/cmdline-tools/ohpm/bin/ 2>/dev/null || true
        echo "✅ Tools ready" && df -h /

    # ────────────────────────────────────────────
    # SDK 目录结构修正（hvigor 实际期望 $SDK_HOME/<component> 根目录结构）
    # ────────────────────────────────────────────
    - name: Normalize SDK layout for hvigor
      run: |
        SDK_HOME=~/ohos-sdk

        echo "=== Pre-restructure contents ==="
        ls -la "$SDK_HOME/"

        # Read apiVersion from any component's oh-uni-package.json
        PKG_FILE=$(find "$SDK_HOME" -maxdepth 2 -name "oh-uni-package.json" -type f | head -1)
        if [ -n "$PKG_FILE" ]; then
          API_VER=$(python3 -c "import json; print(json.load(open('$PKG_FILE'))['apiVersion'])")
        else
          API_VER=$(find "$SDK_HOME/openharmony" -maxdepth 1 -mindepth 1 -type d -exec basename {} \; 2>/dev/null | head -1)
        fi
        echo "SDK API version: $API_VER"

        # hvigor's HosLocalComponentLoader resolves expected locations as:
        #   $SDK_HOME/<component path>
        # It does NOT expect nested openharmony/<apiVersion>/component paths.
        # Normalize the cached SDK back to a flat root layout.
        if [ -n "$API_VER" ]; then
          for comp in ets js native toolchains previewer; do
            ROOT_DIR="$SDK_HOME/$comp"
            OH_NESTED_DIR="$SDK_HOME/openharmony/$API_VER/$comp"

            if [ ! -d "$ROOT_DIR" ] && [ -d "$OH_NESTED_DIR" ]; then
              mv "$OH_NESTED_DIR" "$ROOT_DIR"
              echo "  Flattened $comp -> $ROOT_DIR"
            fi
          done

          # Verify required OpenHarmony components; create stubs for missing ones.
          # hvigor checks oh-uni-package.json and scans sdk-pkg.json in each root dir.
          for comp in ets js native toolchains previewer; do
            COMP_DIR="$SDK_HOME/$comp"
            if [ ! -d "$COMP_DIR" ]; then
              echo "  ⚠️  Missing component '$comp' — creating stub"
              mkdir -p "$COMP_DIR"
            fi
            if [ ! -f "$COMP_DIR/oh-uni-package.json" ]; then
              echo "  ⚠️  Missing oh-uni-package.json in '$comp' — creating from template"
              cat > "$COMP_DIR/oh-uni-package.json" << STUBEOF
        {"apiVersion":"$API_VER","displayName":"${comp^}","meta":{"metaVersion":"4.0.0"},"path":"$comp","releaseType":"Beta1","version":"6.0.0.47"}
        STUBEOF
            fi
            # hvigor scanner looks for sdk-pkg.json (not oh-uni-package.json!)
            # Format: {data: {...}, meta: {version: "3.0.0"}}
            if [ ! -f "$COMP_DIR/sdk-pkg.json" ]; then
              echo "  Creating sdk-pkg.json for '$comp'"
              python3 -c "
        import json, sys
        pkg_path = '$COMP_DIR/oh-uni-package.json'
        with open(pkg_path) as f:
            pkg = json.load(f)
        meta_ver = '3.0.0'
        if 'meta' in pkg and 'metaVersion' in pkg['meta']:
            meta_ver = pkg['meta']['metaVersion']
        data = {k: v for k, v in pkg.items() if k != 'meta'}
        sdk_pkg = {'data': data, 'meta': {'version': meta_ver}}
        with open('$COMP_DIR/sdk-pkg.json', 'w') as f:
            json.dump(sdk_pkg, f)
        print(f'  Created sdk-pkg.json for $comp (meta version: {meta_ver})')
        "
            fi
          done

          # When runtimeOS=HarmonyOS, hvigor also checks for uni-package.json.
          # Keep these files on the same flat root component directories.
          for comp in toolchains ets native; do
            HMS_COMP="$SDK_HOME/$comp"
            mkdir -p "$HMS_COMP"
            if [ ! -f "$HMS_COMP/uni-package.json" ]; then
              cat > "$HMS_COMP/uni-package.json" << STUBEOF
        {"apiVersion":"$API_VER","displayName":"${comp^}","meta":{"metaVersion":"4.0.0"},"path":"$comp","releaseType":"Beta1","version":"6.0.0.47"}
        STUBEOF
            fi
          done

          # Avoid duplicate sdk-pkg.json entries from previous cache layouts.
          # Recursive scanning can otherwise pick nested OpenHarmony/HarmonyOS
          # component locations that fail the later file-existence check.
          rm -rf "$SDK_HOME/openharmony" "$SDK_HOME/HarmonyOS"
          echo "SDK normalized to flat root layout"
        else
          echo "⚠️  Could not determine API version"
        fi

        echo "SDK_API_VERSION=$API_VER" >> "$GITHUB_ENV"
        echo "=== Post-normalization structure ==="
        find "$SDK_HOME" -maxdepth 4 -type d
        echo "=== oh-uni-package.json locations ==="
        find "$SDK_HOME" -name "oh-uni-package.json" -o -name "uni-package.json" | sort

    # ────────────────────────────────────────────
    # 环境配置
    # ────────────────────────────────────────────
    - name: Setup environment
      run: |
        SDK_HOME=~/ohos-sdk
        NATIVE_DIR="$(find "$SDK_HOME" -maxdepth 3 -name "native" -type d | head -1)"
        TOOLCHAINS_DIR="$(find "$SDK_HOME" -maxdepth 3 -name "toolchains" -type d | head -1)"

        [ -n "$TOOLCHAINS_DIR" ] && echo "$TOOLCHAINS_DIR" >> "$GITHUB_PATH"
        [ -n "$NATIVE_DIR" ] && echo "${NATIVE_DIR}/build-tools/cmake/bin" >> "$GITHUB_PATH"
        echo "$HOME/cmdline-tools/ohpm/bin" >> "$GITHUB_PATH"
        echo "$HOME/cmdline-tools/hvigor/bin" >> "$GITHUB_PATH"

        {
          echo "OHOS_SDK_HOME=$SDK_HOME"
          echo "HOS_SDK_HOME=$SDK_HOME"
          echo "OHOS_BASE_SDK_HOME=$SDK_HOME"
          echo "DEVECO_SDK_HOME=$SDK_HOME"
        } >> "$GITHUB_ENV"

        echo "✅ Environment configured"

    # ────────────────────────────────────────────
    # build-profile.json5
    # ────────────────────────────────────────────
    - name: Create build profile (unsigned)
      if: steps.signing.outputs.available != 'true'
      run: |
        cat > build-profile.json5 << 'EOF'
        {
          "app": {
            "signingConfigs": [],
            "products": [
              {
                "name": "default",
                "compatibleSdkVersion": "5.0.0(12)",
                "targetSdkVersion": "6.0.0(20)",
                "runtimeOS": "HarmonyOS",
                "buildOption": {
                  "strictMode": {
                    "caseSensitiveCheck": true,
                    "useNormalizedOHMUrl": true
                  }
                }
              }
            ],
            "buildModeSet": [
              { "name": "debug" },
              { "name": "release" }
            ]
          },
          "modules": [
            {
              "name": "entry",
              "srcPath": "./entry",
              "targets": [{ "name": "default", "applyToProducts": ["default"] }]
            },
            {
              "name": "nativelib",
              "srcPath": "./nativelib",
              "targets": [{ "name": "default", "applyToProducts": ["default"] }]
            }
          ]
        }
        EOF
        echo "✅ Created unsigned build profile"

    - name: Create build profile (signed)
      if: steps.signing.outputs.available == 'true'
      run: |
        # 从 Secrets 解码签名文件（Base64 编码存储）
        mkdir -p .signing
        echo "${{ secrets.SIGNING_CERT }}" | base64 -d > .signing/cert.cer
        echo "${{ secrets.SIGNING_PROFILE }}" | base64 -d > .signing/profile.p7b
        echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > .signing/keystore.p12

        CERT_PATH="$(pwd)/.signing/cert.cer"
        PROFILE_PATH="$(pwd)/.signing/profile.p7b"
        KEYSTORE_PATH="$(pwd)/.signing/keystore.p12"
        KEY_ALIAS="${{ secrets.SIGNING_KEY_ALIAS }}"
        KEY_PASSWORD="${{ secrets.SIGNING_KEY_PASSWORD }}"
        STORE_PASSWORD="${{ secrets.SIGNING_STORE_PASSWORD }}"

        cat > build-profile.json5 << PROFILE_EOF
        {
          "app": {
            "signingConfigs": [
              {
                "name": "default",
                "type": "HarmonyOS",
                "material": {
                  "certpath": "${CERT_PATH}",
                  "keyAlias": "${KEY_ALIAS}",
                  "keyPassword": "${KEY_PASSWORD}",
                  "profile": "${PROFILE_PATH}",
                  "signAlg": "SHA256withECDSA",
                  "storeFile": "${KEYSTORE_PATH}",
                  "storePassword": "${STORE_PASSWORD}"
                }
              }
            ],
            "products": [
              {
                "name": "default",
                "signingConfig": "default",
                "compatibleSdkVersion": "5.0.0(12)",
                "targetSdkVersion": "6.0.0(20)",
                "runtimeOS": "HarmonyOS",
                "buildOption": {
                  "strictMode": {
                    "caseSensitiveCheck": true,
                    "useNormalizedOHMUrl": true
                  }
                }
              }
            ],
            "buildModeSet": [
              { "name": "debug" },
              { "name": "release" }
            ]
          },
          "modules": [
            {
              "name": "entry",
              "srcPath": "./entry",
              "targets": [{ "name": "default", "applyToProducts": ["default"] }]
            },
            {
              "name": "nativelib",
              "srcPath": "./nativelib",
              "targets": [{ "name": "default", "applyToProducts": ["default"] }]
            }
          ]
        }
        PROFILE_EOF
        echo "✅ Created signed build profile"

    # ────────────────────────────────────────────
    # 依赖安装
    # ────────────────────────────────────────────
    - name: Cache ohpm packages
      uses: actions/cache@v4
      with:
        path: |
          oh_modules
          entry/oh_modules
          nativelib/oh_modules
          ~/.ohpm
        key: ohpm-${{ hashFiles('**/oh-package.json5') }}
        restore-keys: ohpm-

    - name: Setup hvigor
      run: |
        set -euo pipefail
        CMDTOOLS_HVIGOR="$HOME/cmdline-tools/hvigor"

        # Create ~/.npmrc to satisfy hvigorw requirement
        echo "@ohos:registry=https://repo.huaweicloud.com/repository/npm/" > ~/.npmrc

        # Create node_modules/@ohos inside command-line-tools so internal
        # cross-references between hvigor packages resolve correctly
        # (Node.js resolves from real path after following symlinks)
        mkdir -p "$CMDTOOLS_HVIGOR/node_modules/@ohos"
        ln -sf "$CMDTOOLS_HVIGOR/hvigor" "$CMDTOOLS_HVIGOR/node_modules/@ohos/hvigor"
        ln -sf "$CMDTOOLS_HVIGOR/hvigor-ohos-plugin" "$CMDTOOLS_HVIGOR/node_modules/@ohos/hvigor-ohos-plugin"

        # Symlink into project directories for hvigorfile.ts imports
        for dir in . hvigor entry nativelib; do
          mkdir -p "$dir/node_modules/@ohos"
          ln -sf "$CMDTOOLS_HVIGOR/hvigor" "$dir/node_modules/@ohos/hvigor"
          ln -sf "$CMDTOOLS_HVIGOR/hvigor-ohos-plugin" "$dir/node_modules/@ohos/hvigor-ohos-plugin"
        done

        echo "✅ hvigor setup done"

    - name: Patch hos-config.json for API 20
      run: |
        # command-line-tools 5.1.0 only maps up to API 18 (5.1.0).
        # SDK 6.0-Release uses API 20, so we must add the mapping.
        echo "=== Patching hos-config.json for API 20 support ==="
        find ~/cmdline-tools -name "hos-config.json" -type f | while read -r cfg; do
          echo "Patching: $cfg"
          CONFIG_PATH="$cfg" python3 -c "
        import json, os
        p = os.environ['CONFIG_PATH']
        with open(p) as f:
            c = json.load(f)
        c.setdefault('osVersionMapper', {})['6.0.0'] = '20'
        c.setdefault('osNameMapper', {})['6.0.0'] = 'HarmonyOS NEXT3'
        c.setdefault('pathVersionMapper', {})['6.0.0'] = 'HarmonyOS-NEXT3'
        with open(p, 'w') as f:
            json.dump(c, f, indent=2)
        print('  Patched successfully')
        "
        done

    - name: Install ohpm dependencies
      run: |
        ohpm config set registry https://ohpm.openharmony.cn/ohpm/
        ohpm config set strict_ssl false
        ohpm install --all
        echo "✅ Dependencies installed"

    # ────────────────────────────────────────────
    # 构建
    # ────────────────────────────────────────────
    - name: Debug SDK structure
      run: |
        echo "=== Verify hos-config.json patch ==="
        find ~/cmdline-tools -name "hos-config.json" -type f | while read -r cfg; do
          python3 -c "import json,sys; c=json.load(open(sys.argv[1], encoding='utf-8')); m=c.get('osVersionMapper', {}); print(sys.argv[1], '=>', '6.0.0' in m, 'API', m.get('6.0.0', 'MISSING'))" "$cfg"
        done

        echo "=== ALL sdk-pkg.json files ==="
        find ~/ohos-sdk -name "sdk-pkg.json" -type f | sort | while read -r f; do
          echo "$f => $(python3 -c "import json; d=json.load(open('$f')); print(d.get('data',{}).get('path','?'), 'api='+str(d.get('data',{}).get('apiVersion','?')), 'meta='+str(d.get('meta',{}).get('version','?')))")"
        done

        echo "=== Sample oh-uni-package.json (ets) ==="
        cat ~/ohos-sdk/ets/oh-uni-package.json 2>/dev/null || echo "(not found at root)"
        echo ""

        echo "=== HOS_CONFIG dump ==="
        node -e "
        process.env.NODE_PATH = '$HOME/cmdline-tools/hvigor/hvigor-ohos-plugin/node_modules:$HOME/cmdline-tools/hvigor/node_modules/@ohos/hvigor/node_modules';
        require('module').Module._initPaths();
        const cfg = require('@ohos/hos-sdkmanager-common/build/res/hos-config.json');
        console.log('sdkSufNameMapper:', JSON.stringify(cfg.sdkSufNameMapper));
        console.log('pathVersionMapper:', JSON.stringify(cfg.pathVersionMapper));
        console.log('osVersionMapper:', JSON.stringify(cfg.osVersionMapper));
        console.log('hosSupportVersion:', cfg.hosSupportVersion);
        " 2>&1 || true

        echo "=== SimpleHosPrjSdkHandler source ==="
        find ~/cmdline-tools -path "*/hos-sdkmanager-common/build/src/hos/*" -name "*.js" | sort | head -20
        # Dump the handler factory source
        HANDLER_SRC=$(find ~/cmdline-tools -path "*/hos-sdkmanager-common/build/src/hos/handler/*" -name "*.js" | head -5)
        for f in $HANDLER_SRC; do
          echo "--- $f ---"
          cat "$f" | tr ';' '\n' | head -40
        done

        echo "=== SDK handler deep test ==="
        node -e "
        process.env.NODE_PATH = '$HOME/cmdline-tools/hvigor/hvigor-ohos-plugin/node_modules:$HOME/cmdline-tools/hvigor/node_modules/@ohos/hvigor/node_modules';
        require('module').Module._initPaths();
        try {
          const {HosVersionMapper} = require('@ohos/hos-sdkmanager-common/build/src/hos/api/hos-version-mapper');
          console.log('getHosVersion(20):', JSON.stringify(HosVersionMapper.INSTANCE.getHosVersion(20)));
          const {HosPrjSdkConfig, SimpleHosPrjSdkHandler, HosPrjSdkType} = require('@ohos/hos-sdkmanager-common');
          const sdkDir = process.env.DEVECO_SDK_HOME;
          console.log('DEVECO_SDK_HOME:', sdkDir);
          const config = HosPrjSdkConfig.builder(sdkDir);
          // Dump config internal state
          for (const k of Object.getOwnPropertyNames(config)) {
            const v = config[k];
            if (typeof v === 'string' || typeof v === 'number') console.log('config.' + k + ':', v);
          }
          const logs = [];
          const progress = { debug:(m)=>logs.push('D: '+m), warn:(m)=>logs.push('W: '+m), info:(m)=>logs.push('I: '+m), error:(m)=>logs.push('E: '+m) };
          const handler = new SimpleHosPrjSdkHandler(config, progress);
          const oh = handler.getSdkHandler(HosPrjSdkType.OPENHARMONY);
          // Dump handler internal state
          console.log('OH handler type:', oh?.constructor?.name);
          for (const k of Object.getOwnPropertyNames(oh)) {
            const v = oh[k];
            if (typeof v === 'string') console.log('oh.' + k + ':', v);
            if (v && typeof v === 'object' && v.sdkRoot) console.log('oh.' + k + '.sdkRoot:', v.sdkRoot);
            if (v && typeof v === 'object' && v.getSdkRoot) console.log('oh.' + k + '.getSdkRoot():', v.getSdkRoot());
          }
          const sdks = oh.getLocalSdks('20');
          console.log('localSdks for API 20: size =', sdks?.size);
          const fs = require('fs');
          const path = require('path');
          if (sdks) { for (const [k,v] of sdks.entries()) {
            const loc = v?.getLocation?.();
            console.log(' ', k, '->', loc, 'oh-uni=', fs.existsSync(path.join(loc||'','oh-uni-package.json')), 'sdk-pkg=', fs.existsSync(path.join(loc||'','sdk-pkg.json')));
          }}
          const hms = handler.getSdkHandler(HosPrjSdkType.HARMONYOS);
          console.log('HMS handler type:', hms?.constructor?.name);
          for (const k of Object.getOwnPropertyNames(hms)) {
            const v = hms[k];
            if (typeof v === 'string') console.log('hms.' + k + ':', v);
            if (v && typeof v === 'object' && v.sdkRoot) console.log('hms.' + k + '.sdkRoot:', v.sdkRoot);
            if (v && typeof v === 'object' && v.getSdkRoot) console.log('hms.' + k + '.getSdkRoot():', v.getSdkRoot());
          }
          const hmsSdks = hms.getLocalSdks('20');
          console.log('hms localSdks for API 20: size =', hmsSdks?.size);
          if (hmsSdks) {
            for (const [k,v] of hmsSdks.entries()) {
              const loc = v?.getLocation?.();
              console.log(' HMS', k, '->', loc, 'uni=', fs.existsSync(path.join(loc || '', 'uni-package.json')));
            }
          }
          console.log('=== Scanner logs ===');
          logs.forEach(l => console.log(l));
        } catch(e) { console.log('Error:', e.message); console.log(e.stack); }
        " 2>&1 || true

        echo "=== Check toolchains internal structure ==="
        find ~/ohos-sdk/toolchains -maxdepth 3 -name "sdk-pkg.json" -o -name "oh-uni-package.json" -o -name "uni-package.json" 2>/dev/null | sort
        echo "=== Directories inside toolchains ==="
        ls -la ~/ohos-sdk/toolchains/ 2>/dev/null

    - name: Build HAP
      run: |
        BUILD_MODE="${{ steps.build-mode.outputs.mode }}"
        echo "🔨 Building ${BUILD_MODE} HAP..."

        export NODE_HOME="$(dirname "$(dirname "$(which node)")")"
        export JAVA_HOME="${JAVA_HOME_17_X64}"

        node hvigorw.js assembleHap \
          --mode module \
          -p product=default \
          -p buildMode="${BUILD_MODE}" \
          --no-daemon \
          --stacktrace \
          2>&1 | tee build-hap.log

        echo "✅ HAP build completed:"
        find . -name "*.hap" -type f -exec sh -c 'echo "  $(du -h "$1" | cut -f1)  $1"' _ {} \;

    - name: Build APP (signed)
      if: steps.signing.outputs.available == 'true'
      run: |
        BUILD_MODE="${{ steps.build-mode.outputs.mode }}"
        echo "🔨 Building ${BUILD_MODE} APP (signed)..."

        export NODE_HOME="$(dirname "$(dirname "$(which node)")")"
        export JAVA_HOME="${JAVA_HOME_17_X64}"

        node hvigorw.js assembleApp \
          --mode module \
          -p product=default \
          -p buildMode="${BUILD_MODE}" \
          --no-daemon \
          2>&1 | tee build-app.log

        echo "✅ APP build completed:"
        find . -name "*.app" -type f -exec sh -c 'echo "  $(du -h "$1" | cut -f1)  $1"' _ {} \;

    # ────────────────────────────────────────────
    # 清理签名文件
    # ────────────────────────────────────────────
    - name: Cleanup signing files
      if: always()
      run: rm -rf .signing/

    # ────────────────────────────────────────────
    # 上传产物
    # ────────────────────────────────────────────
    - name: Upload HAP artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: moonlight-hap-${{ steps.version.outputs.version }}-${{ steps.build-mode.outputs.mode }}
        path: |
          entry/build/default/outputs/**/*.hap
        if-no-files-found: warn
        retention-days: 30

    - name: Upload APP artifact
      uses: actions/upload-artifact@v4
      if: steps.signing.outputs.available == 'true'
      with:
        name: moonlight-app-${{ steps.version.outputs.version }}-${{ steps.build-mode.outputs.mode }}
        path: |
          entry/build/default/outputs/**/*.app
          build/default/outputs/**/*.app
        if-no-files-found: warn
        retention-days: 30

    - name: Upload build logs on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs-${{ github.run_id }}
        path: |
          build-hap.log
          build-app.log
        retention-days: 7

  # ================================================================
  # Release — 仅 tag push 触发
  # ================================================================
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: moonlight-*
        path: ./artifacts
        merge-multiple: true

    - name: List artifacts
      run: |
        echo "📦 Release artifacts:"
        find ./artifacts -type f \( -name "*.hap" -o -name "*.app" \) \
          -exec sh -c 'echo "  $(du -h "$1" | cut -f1)  $1"' _ {} \;

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./artifacts/**/*.hap
          ./artifacts/**/*.app
        draft: false
        prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}
        generate_release_notes: true
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
